<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping World Tycoon</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/World_map_blank_without_borders.svg/1280px-World_map_blank_without_borders.svg.png') no-repeat center center fixed;
            background-size: cover;
            color: #0ff; 
            margin: 0; 
            padding: 20px; 
        }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,20,45,0.8); z-index: -1; }
        .container { max-width: 1200px; margin: auto; background: rgba(17,34,51,0.95); padding: 20px; border-radius: 12px; display: flex; gap: 20px; }
        .main { flex: 1; }
        .sidebar { width: 300px; background: rgba(34,51,68,0.98); padding: 18px; border-radius: 10px; }
        h1 { color: #0f0; text-align: center; text-shadow: 0 0 12px #000; }
        button { background: #0a5; color: white; padding: 12px 18px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0f8; }
        .ship { background: rgba(34,51,68,0.95); padding: 14px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
        .log { height: 240px; overflow-y: scroll; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 6px; }
        .port-marker { position: absolute; color: #ff0; font-size: 32px; text-shadow: 0 0 10px #f00; cursor: pointer; z-index: 100; }
        .port-marker:hover { transform: scale(1.4); }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="main">
            <h1>🌍 Shipping World Tycoon</h1>
            <div id="status"></div>
            <h2>Your Fleet</h2>
            <div id="fleet"></div>
            <h2>Actions</h2>
            <button onclick="buyShip()">Buy New Ship</button>
            <button onclick="hireCrew()">Hire Crew</button>
            <button onclick="upgradeShip()">Upgrade Selected Ship</button>
            <h3>Game Log</h3>
            <div id="log" class="log"></div>
        </div>
        <div class="sidebar">
            <h2>📍 Live Port Prices</h2>
            <div id="prices"></div>
        </div>
    </div>

    <div class="port-marker" style="top: 35%; left: 18%;" onclick="goToPort('Cheap Harbor')" title="Cheap Harbor">📍</div>
    <div class="port-marker" style="top: 48%; left: 52%;" onclick="goToPort('Trade Island')" title="Trade Island">📍</div>
    <div class="port-marker" style="top: 62%; left: 82%;" onclick="goToPort('Luxury Bay')" title="Luxury Bay">📍</div>
    <div class="port-marker" style="top: 25%; left: 65%;" onclick="goToPort('Home Port')" title="Home Port">📍</div>

    <script>
        let player = { money: 25000, ships: [] };
        const ports = {
            "Cheap Harbor": { goods: 45, luxury: 110 },
            "Trade Island": { goods: 85, luxury: 210 },
            "Luxury Bay": { goods: 195, luxury: 520 },
            "Home Port": { goods: 125, luxury: 310 }
        };
        let selected = 0;

        function log(msg) {
            const d = document.getElementById('log');
            d.innerHTML += `<div>${new Date().toLocaleTimeString()} → ${msg}</div>`;
            d.scrollTop = d.scrollHeight;
        }

        function updateStatus() {
            document.getElementById('status').innerHTML = `<h2>Money: <span style="color:#0f0">$${player.money.toLocaleString()}</span></h2>`;
        }

        function updatePrices() {
            let html = '';
            for (let p in ports) {
                html += `<strong>${p}</strong><br>Goods: $${ports[p].goods} | Luxury: $${ports[p].luxury}<hr>`;
            }
            document.getElementById('prices').innerHTML = html;
        }

        function renderFleet() {
            let html = player.ships.length === 0 ? '<p>No ships yet. Buy one!</p>' : '';
            player.ships.forEach((s, i) => {
                const cargo = s.cargo > 0 ? `${s.cargo}/${s.capacity} ${s.cargoType || ''}` : 'Empty';
                html += `<div class="ship" onclick="selectShip(${i})" style="${i===selected?'border:3px solid #0ff':''}">
                    <strong>${s.name}</strong> @ ${s.location}<br>
                    Cargo: ${cargo} | Speed: ${s.speed}s<br>
                    <button onclick="event.stopImmediatePropagation();travel(${i})">Sail</button>
                    <button onclick="event.stopImmediatePropagation();load(${i})">Load</button>
                    <button onclick="event.stopImmediatePropagation();sell(${i})">Sell</button>
                </div>`;
            });
            document.getElementById('fleet').innerHTML = html;
        }

        function selectShip(i){ selected = i; renderFleet(); }

        function buyShip(){
            const opts = [{n:"Small Freighter",c:8000,cap:120,sp:4},{n:"Medium Trader",c:22000,cap:400,sp:6},{n:"Large Cargo",c:55000,cap:1100,sp:9}];
            let ch = prompt("1: Small ($8000)\n2: Medium ($22000)\n3: Large ($55000)");
            ch = parseInt(ch)-1;
            if(ch>=0 && ch<3 && player.money >= opts[ch].c){
                player.money -= opts[ch].c;
                player.ships.push({name:opts[ch].n, capacity:opts[ch].cap, speed:opts[ch].sp, cargo:0, cargoType:null, location:"Home Port"});
                log(`✅ Bought ${opts[ch].n}!`);
                updateStatus(); renderFleet();
            } else if(ch >= 0) log("❌ Not enough money!");
        }

        function travel(i){
            if(!player.ships[i]) return;
            const dest = prompt("Destination:\nCheap Harbor\nTrade Island\nLuxury Bay\nHome Port");
            if(!ports[dest]) return;
            const ship = player.ships[i];
            log(`🚢 ${ship.name} sailing to ${dest}...`);
            setTimeout(() => {
                ship.location = dest;
                log(`✅ Arrived at ${dest}!`);
                renderFleet();
            }, ship.speed * 1000);
        }

        function load(i){
            if(!player.ships[i]) return;
            const ship = player.ships[i];
            const p = ports[ship.location];
            let t = prompt("1=Goods\n2=Luxury") === "1" ? "goods" : "luxury";
            let amt = parseInt(prompt("Amount?")) || 0;
            amt = Math.min(amt, ship.capacity - ship.cargo);
            const cost = amt * p[t];
            if(cost > 0 && player.money >= cost){
                player.money -= cost;
                ship.cargo += amt;
                ship.cargoType = t;
                log(`📦 Loaded ${amt} ${t}`);
                updateStatus(); renderFleet();
            }
        }

        function sell(i){
            if(!player.ships[i]) return;
            const ship = player.ships[i];
            if(ship.cargo <= 0) return alert("No cargo!");
            const rev = ship.cargo * ports[ship.location][ship.cargoType];
            player.money += rev;
            log(`💰 Sold for $${rev}`);
            ship.cargo = 0; ship.cargoType = null;
            updateStatus(); renderFleet();
        }

        function hireCrew(){
            if(!player.ships.length) return alert("No ships!");
            const s = player.ships[selected];
            if(player.money >= 1500){
                player.money -= 1500;
                s.speed = Math.max(2, s.speed-1);
                log(`👥 Crew hired!`);
                updateStatus(); renderFleet();
            }
        }

        function upgradeShip(){
            if(!player.ships.length) return alert("No ships!");
            const s = player.ships[selected];
            if(player.money >= 15000){
                player.money -= 15000;
                s.capacity += 300;
                s.speed = Math.max(2, s.speed-1);
                log(`⚡ Upgraded!`);
                updateStatus(); renderFleet();
            }
        }

        function goToPort(port) {
            alert(`Use your ship's "Sail" button to go to ${port}`);
        }

        // Start
        updateStatus();
        renderFleet();
        updatePrices();
        log("🌍 Welcome to Shipping World Tycoon!");

        setInterval(() => localStorage.setItem('swSave', JSON.stringify(player)), 20000);
        const saved = localStorage.getItem('swSave');
        if(saved) {
            player = JSON.parse(saved);
            log("📂 Game loaded!");
            updateStatus(); renderFleet();
        }
    </script>
</body>
</html>
